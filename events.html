<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){var t=localStorage.getItem("culturehub_theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CultureHub — Events</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="nav-root"></div>
<main class="page" id="root"></main>

<script src="data.js"></script>
<script src="utils.js"></script>
<script>
document.getElementById('nav-root').innerHTML = navHTML();
setActiveNav();

const EVENT_TYPES = ['General','Game','Social','Team Building','Holiday','Charity'];
let filterType = 'all', searchQ = '';

function showEventModal(id = null) {
  const event = id ? CH.getEvents().find(e => e.id === id) : null;
  const overlay = openModal(`
    <div class="modal-header">
      <span class="modal-title">${event ? '✏️ Edit Event' : '➕ New Event'}</span>
      <button class="modal-close" onclick="closeModal(this)">✕</button>
    </div>
    <div class="form-group">
      <label>Event Title *</label>
      <input class="form-control" id="ev-title" placeholder="e.g. Summer Trivia Night" value="${event ? event.title : ''}"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" class="form-control" id="ev-date" value="${event ? event.date : ''}"/>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select class="form-control" id="ev-type">
          ${EVENT_TYPES.map(t => `<option ${event&&event.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Location</label>
      <input class="form-control" id="ev-loc" placeholder="Conference Room A, Rooftop, etc." value="${event ? event.location : ''}"/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea class="form-control" id="ev-desc" placeholder="What's this event about?">${event ? event.description : ''}</textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal(this)">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvent('${id||''}')">
        ${event ? 'Save Changes' : 'Create Event'}
      </button>
    </div>
  `);
}

function saveEvent(id) {
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { toast('Title is required', 'error'); return; }
  const date = document.getElementById('ev-date').value;
  const type = document.getElementById('ev-type').value;
  const location = document.getElementById('ev-loc').value;
  const description = document.getElementById('ev-desc').value;
  if (id) {
    CH.updateEvent(id, { title, date, type, location, description });
    toast('Event updated', 'success');
  } else {
    CH.addEvent(title, date, type, description, location);
    toast('Event created!', 'success');
  }
  closeAllModals();
  render();
}

async function deleteEvent(id, title) {
  const ok = await confirmDialog(`Delete "<strong>${title}</strong>"? All attendance data will be lost.`);
  if (!ok) return;
  CH.deleteEvent(id);
  toast('Event deleted', 'info');
  render();
}

function render() {
  let events = CH.getEvents().sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1);
  if (filterType !== 'all') events = events.filter(e => e.type === filterType);
  if (searchQ) events = events.filter(e => e.title.toLowerCase().includes(searchQ) || (e.location||'').toLowerCase().includes(searchQ));

  document.getElementById('root').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">📅 <span>Events</span></div>
        <div class="page-subtitle">${CH.getEvents().length} total events</div>
      </div>
      <button class="btn btn-primary" onclick="showEventModal()">+ New Event</button>
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center">
      <div class="search-wrap" style="flex:1;min-width:200px">
        <input class="form-control" id="ev-search" placeholder="Search events..." value="${searchQ}"
          oninput="searchQ=this.value.toLowerCase();render()"/>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-sm ${filterType==='all'?'btn-primary':'btn-secondary'}" onclick="filterType='all';render()">All</button>
        ${EVENT_TYPES.map(t=>`
          <button class="btn btn-sm ${filterType===t?'btn-primary':'btn-ghost'}" onclick="filterType='${t}';render()">${t}</button>
        `).join('')}
      </div>
    </div>

    <!-- Events Grid -->
    ${events.length === 0 ? `
      <div class="empty-state">
        <span class="empty-icon">📅</span>
        <h3>${searchQ||filterType!=='all' ? 'No events match' : 'No events yet'}</h3>
        <p>${searchQ||filterType!=='all' ? 'Try different filters.' : 'Create your first event to get started!'}</p>
        ${!searchQ&&filterType==='all'?`<button class="btn btn-primary" style="margin-top:16px" onclick="showEventModal()">+ Create Event</button>`:''}
      </div>` :
    `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px">
      ${events.map(ev => {
        const attended = ev.attendees.filter(a=>a.checkedIn).length;
        const registered = ev.attendees.length;
        const pts = ev.attendees.filter(a=>a.checkedIn).reduce((s,a)=>s+a.points,0);
        const upcoming = isUpcoming(ev.date);
        return `
        <div class="card" style="position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${upcoming?'linear-gradient(90deg,var(--accent),#a855f7)':'linear-gradient(90deg,var(--border2),var(--border))'}"></div>
          <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px">
            <div style="width:48px;height:48px;border-radius:12px;background:var(--bg3);border:1px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
              <span style="font-size:0.6rem;color:var(--text3);text-transform:uppercase">${ev.date?new Date(ev.date+'T12:00:00').toLocaleString('en',{month:'short'}):'—'}</span>
              <span style="font-weight:800;font-size:1.1rem;line-height:1">${ev.date?new Date(ev.date+'T12:00:00').getDate():'—'}</span>
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:1rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ev.title}</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${eventTypeBadge(ev.type)}
                ${upcoming ? '<span class="badge badge-green">Upcoming</span>' : '<span class="badge badge-gray">Past</span>'}
              </div>
            </div>
            <div style="display:flex;gap:4px;flex-shrink:0">
              <button class="btn btn-sm btn-ghost btn-icon" onclick="showEventModal('${ev.id}')" title="Edit">✏️</button>
              <button class="btn btn-sm btn-danger btn-icon" onclick="deleteEvent('${ev.id}','${ev.title.replace(/'/g,"\\'")}')">🗑</button>
            </div>
          </div>
          ${ev.location ? `<div style="font-size:0.8rem;color:var(--text2);margin-bottom:10px">📍 ${ev.location}</div>` : ''}
          ${ev.description ? `<div style="font-size:0.85rem;color:var(--text2);margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${ev.description}</div>` : ''}
          <div style="display:flex;gap:16px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:14px">
            <div style="text-align:center;flex:1">
              <div style="font-weight:800;font-size:1.2rem;color:var(--accent)">${attended}</div>
              <div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase">Checked In</div>
            </div>
            <div style="text-align:center;flex:1">
              <div style="font-weight:800;font-size:1.2rem">${registered}</div>
              <div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase">Registered</div>
            </div>
            <div style="text-align:center;flex:1">
              <div style="font-weight:800;font-size:1.2rem;color:var(--gold)">${pts}</div>
              <div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase">Points</div>
            </div>
            <div style="text-align:center;flex:1">
              <div style="font-weight:800;font-size:1.2rem">${ev.gallery.length}</div>
              <div style="font-size:0.7rem;color:var(--text3);text-transform:uppercase">Photos</div>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <a href="checkin.html?event=${ev.id}" class="btn btn-primary btn-sm" style="flex:1;justify-content:center">✅ Check-In</a>
            <a href="gallery.html?event=${ev.id}" class="btn btn-secondary btn-sm" style="flex:1;justify-content:center">🖼 Gallery</a>
            <button class="btn btn-secondary btn-sm btn-icon" onclick="generateReport('event','${ev.id}')" title="Export PDF">📄</button>
          </div>
        </div>`;
      }).join('')}
    </div>`}
  `;
}

window.addEventListener('culturehub:updated', render);
render();
</script>
</body>
</html>
