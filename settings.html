function saveOrgSettings() {
  const orgName = document.getElementById('org-name').value.trim();
  if (!orgName) { toast('Organization name required', 'error'); return; }
  CH.saveSettings({ orgName });
  toast('Settings saved!', 'success');
  render();
}

function doRestore() {
  const raw = document.getElementById('restore-json').value.trim();
  if (!raw) { toast('Paste backup JSON first', 'error'); return; }
  const result = CH.importBackup(raw);
  if (result.ok) {
    toast(`Restored! ${result.people} people, ${result.events} events`, 'success');
    render();
  } else {
    toast('Restore failed: ' + result.error, 'error');
  }
}

function loadRestoreFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    document.getElementById('restore-json').value = evt.target.result;
    toast('File loaded — click Restore to apply', 'info');
  };
  reader.readAsText(file);
}

async function clearAllData() {
  const ok = await confirmDialog(
    '<strong style="color:var(--red)">⚠️ This will erase all data!</strong><br><br>All people, events, attendance, and photos will be permanently deleted. This cannot be undone.<br><br>Make sure you have a backup first.',
    'Delete All Data'
  );
  if (!ok) return;
  const ok2 = await confirmDialog('Are you absolutely sure? Type your intent carefully.', 'Final Confirmation');
  if (!ok2) return;
  localStorage.removeItem('culturehub_data');
  toast('All data cleared', 'info');
  window.location.href = 'index.html';
}

const SAMPLE_SIZE_CONFIG = {
  small:  { count: 8,  eventCount: 3,  label: '8 people · 3 events' },
  medium: { count: 20, eventCount: 6,  label: '20 people · 6 events' },
  large:  { count: 40, eventCount: 10, label: '40 people · 10 events' },
};

function addSampleData(size = 'small') {
  const cfg = SAMPLE_SIZE_CONFIG[size];
  const data = CH.load();

  // Add people, skipping duplicates
  const people = SAMPLE_PEOPLE.slice(0, cfg.count);
  people.forEach(p => {
    if (!data.people.find(x => x.name.toLowerCase() === p.name.toLowerCase())) {
      data.people.push({ id: CH.uid(), name: p.name, team: p.team, email: p.email, avatar: '' });
    }
  });

  // Build index → id map for quick lookup
  const idMap = {};
  people.forEach((p, i) => {
    const found = data.people.find(x => x.name.toLowerCase() === p.name.toLowerCase());
    if (found) idMap[i] = found.id;
  });

  // Build events in memory and push in one save
  SAMPLE_EVENTS.slice(0, cfg.eventCount).forEach(ev => {
    const event = {
      id: CH.uid(), title: ev.title, date: ev.date, type: ev.type,
      description: ev.description, location: ev.location,
      gallery: [], attendees: []
    };
    const checkinSet = new Set(ev.c.filter(i => idMap[i]).map(i => idMap[i]));
    const winnerSet  = new Set(ev.w.filter(i => idMap[i]).map(i => idMap[i]));
    ev.a.filter(i => idMap[i]).forEach(i => {
      const personId  = idMap[i];
      const checkedIn = checkinSet.has(personId);
      const isWinner  = checkedIn && winnerSet.has(personId);
      event.attendees.push({ personId, checkedIn, points: isWinner ? 3 : checkedIn ? 1 : 0, isWinner });
    });
    data.events.push(event);
  });

  CH.save(data);
  toast(`Sample data loaded! ${cfg.label} added.`, 'success');
  render();
}

function exportLeaderboardImage() {
  const lb = CH.getLeaderboard();
  const s = CH.getSettings();
  if (!lb.length) { toast('No leaderboard data yet', 'info'); return; }

  const top = lb.slice(0, lbExportSize);
  const W = 600, ROW_H = 44, HEADER_H = 96, COL_H = 28, FOOTER_H = 40;
  const H = HEADER_H + COL_H + top.length * ROW_H + FOOTER_H;

  const canvas = document.createElement('canvas');
  canvas.width = W * 2; canvas.height = H * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  // Background
  ctx.fillStyle = '#07090f';
  ctx.fillRect(0, 0, W, H);

  // Top accent bar
  const barGrad = ctx.createLinearGradient(0, 0, W, 0);
  barGrad.addColorStop(0, '#00c9b1'); barGrad.addColorStop(1, '#5b9cf6');
  ctx.fillStyle = barGrad;
  ctx.fillRect(0, 0, W, 4);

  // Org name + title
  ctx.fillStyle = '#e6eaf5';
  ctx.font = 'bold 20px Arial, sans-serif';
  ctx.fillText((s.orgName || 'CultureHub') + ' — Leaderboard', 24, 38);
  ctx.fillStyle = '#7e8aab';
  ctx.font = '12px Arial, sans-serif';
  ctx.fillText('Generated ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }), 24, 58);

  // Stats row
  const stats = [
    { n: lb.length, l: 'Members' },
    { n: lb.reduce((a, e) => a + e.events, 0), l: 'Check-Ins' },
    { n: lb.reduce((a, e) => a + e.points, 0), l: 'Points' },
  ];
  stats.forEach((st, i) => {
    const x = 24 + i * 110;
    ctx.fillStyle = '#151924';
    roundRect(ctx, x, 68, 100, 22, 4);
    ctx.fillStyle = '#00c9b1';
    ctx.font = 'bold 13px Arial';
    ctx.fillText(st.n, x + 8, 83);
    ctx.fillStyle = '#7e8aab';
    ctx.font = '10px Arial';
    ctx.fillText(st.l, x + 8 + ctx.measureText(st.n + ' ').width + 2, 83);
  });

  // Column header row
  const colY = HEADER_H;
  ctx.fillStyle = '#0e1118';
  ctx.fillRect(0, colY, W, COL_H);
  ctx.fillStyle = '#47536e';
  ctx.font = '10px Arial';
  [['RANK', 18], ['NAME', 72], ['TEAM', 260], ['EVENTS', 390], ['WINS', 455], ['POINTS', 520]].forEach(([lbl, x]) => {
    ctx.fillText(lbl, x, colY + 18);
  });

  // Rows
  const rankColors = ['#ffb830', '#9ca3af', '#cd7f32'];
  const rankLabels = ['1ST', '2ND', '3RD'];
  top.forEach((entry, i) => {
    const y = HEADER_H + COL_H + i * ROW_H;
    ctx.fillStyle = i % 2 === 0 ? '#0e1118' : '#07090f';
    ctx.fillRect(0, y, W, ROW_H);
    if (i < 3) {
      ctx.fillStyle = rankColors[i];
      ctx.fillRect(0, y, 3, ROW_H);
    }
    const ty = y + ROW_H / 2 + 5;

    // Rank
    ctx.fillStyle = i < 3 ? rankColors[i] : '#47536e';
    ctx.font = i < 3 ? 'bold 12px Arial' : '12px Arial';
    ctx.fillText(i < 3 ? rankLabels[i] : '#' + (i + 1), 18, ty);

    // Name
    ctx.fillStyle = '#e6eaf5';
    ctx.font = 'bold 13px Arial';
    const name = entry.person.name.length > 22 ? entry.person.name.slice(0, 21) + '…' : entry.person.name;
    ctx.fillText(name, 72, ty);

    // Team
    ctx.fillStyle = '#7e8aab';
    ctx.font = '12px Arial';
    const team = (entry.person.team || '—').slice(0, 15);
    ctx.fillText(team, 260, ty);

    // Events
    ctx.fillText(entry.events, 405, ty);

    // Wins
    ctx.fillText(entry.wins, 468, ty);

    // Points
    ctx.fillStyle = '#00c9b1';
    ctx.font = 'bold 14px Arial';
    ctx.fillText(entry.points, 520, ty);
  });

  // Footer
  const footerY = HEADER_H + COL_H + top.length * ROW_H;
  ctx.fillStyle = '#0e1118';
  ctx.fillRect(0, footerY, W, FOOTER_H);
  ctx.fillStyle = '#47536e';
  ctx.font = '11px Arial';
  ctx.fillText('CultureHub  ·  Office Culture Event Tracker', 24, footerY + 24);
  ctx.fillStyle = barGrad;
  ctx.fillRect(0, H - 4, W, 4);

  const link = document.createElement('a');
  link.download = 'leaderboard-top' + lbExportSize + '-' + new Date().toISOString().slice(0, 10) + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  toast('Leaderboard image saved!', 'success');
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

        <div class="page-title">⚙️ <span>Settings</span></div>
        <div class="page-subtitle">Configure CultureHub and manage your data</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">
      <!-- Left column -->
      <div style="display:flex;flex-direction:column;gap:24px">
        <!-- Organization settings -->
        <div class="card">
          <div class="card-title">🏢 Organization</div>
          <div class="form-group">
            <label>Organization Name</label>
            <input class="form-control" id="org-name" value="${s.orgName||'Our Organization'}" placeholder="My Company"/>
          </div>
          <button class="btn btn-primary" onclick="saveOrgSettings()">Save Settings</button>
        </div>

        <!-- Data overview -->
        <div class="card">
          <div class="card-title">📊 Data Summary</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
            <div style="background:var(--bg3);border-radius:8px;padding:14px;text-align:center">
              <div style="font-size:1.8rem;font-weight:800;color:var(--accent)">${data.people.length}</div>
              <div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase">People</div>
            </div>
            <div style="background:var(--bg3);border-radius:8px;padding:14px;text-align:center">
              <div style="font-size:1.8rem;font-weight:800;color:var(--gold)">${data.events.length}</div>
              <div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase">Events</div>
            </div>
            <div style="background:var(--bg3);border-radius:8px;padding:14px;text-align:center">
              <div style="font-size:1.8rem;font-weight:800;color:var(--green)">${data.events.reduce((s,e)=>s+e.attendees.filter(a=>a.checkedIn).length,0)}</div>
              <div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase">Check-Ins</div>
            </div>
            <div style="background:var(--bg3);border-radius:8px;padding:14px;text-align:center">
              <div style="font-size:1.8rem;font-weight:800">${sizeFmt}</div>
              <div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase">Storage Used</div>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" onclick="generateReport('overview')" style="flex:1;justify-content:center">📄 Full Report PDF</button>
          </div>
        </div>

        <!-- Leaderboard Export -->
        <div class="card">
          <div class="card-title">🏆 Leaderboard Export</div>
          <p style="color:var(--text2);font-size:0.875rem;margin-bottom:12px">
            Share or print the current leaderboard standings.
          </p>
          <div style="margin-bottom:14px">
            <div style="font-size:0.75rem;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Top N members</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap" id="lb-size-btns">
              ${[3,5,10,15,25].map(n => `<button class="btn btn-sm${n===10?' btn-primary':' btn-secondary'}" onclick="setLbSize(${n})" id="lb-size-${n}" style="min-width:44px;justify-content:center">${n}</button>`).join('')}
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" onclick="exportLeaderboardImage()" style="flex:1;justify-content:center">📧 Email Image</button>
            <button class="btn btn-secondary" onclick="printLeaderboard()" style="flex:1;justify-content:center">🖨 Print 8.5×11</button>
          </div>
          <p style="font-size:0.78rem;color:var(--text3);margin-top:8px">Email image is 600px wide PNG · Print is landscape letter</p>
        </div>

        <!-- Sample Data -->
        <div class="card">
          <div class="card-title">🧪 Demo & Testing</div>
          <p style="color:var(--text2);font-size:0.875rem;margin-bottom:12px">Load sample data to explore CultureHub with pre-populated people, events, and attendance.</p>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
            <button class="btn btn-secondary" onclick="addSampleData('small')" style="flex-direction:column;align-items:center;gap:3px;padding:12px 8px">
              <span>🏠 Small</span>
              <span style="font-size:0.7rem;color:var(--text3)">8 people · 3 events</span>
            </button>
            <button class="btn btn-secondary" onclick="addSampleData('medium')" style="flex-direction:column;align-items:center;gap:3px;padding:12px 8px">
              <span>🏢 Medium</span>
              <span style="font-size:0.7rem;color:var(--text3)">20 people · 6 events</span>
            </button>
            <button class="btn btn-secondary" onclick="addSampleData('large')" style="flex-direction:column;align-items:center;gap:3px;padding:12px 8px">
              <span>🏙 Large</span>
              <span style="font-size:0.7rem;color:var(--text3)">40 people · 10 events</span>
            </button>
          </div>
          <p style="font-size:0.78rem;color:var(--text3)">Existing people won't be duplicated.</p>
        </div>
      </div>

      <!-- Right column: Backup / Restore -->
      <div style="display:flex;flex-direction:column;gap:24px">
        <!-- Backup -->
        <div class="card">
          <div class="card-title">💾 Backup Data</div>
          <p style="color:var(--text2);font-size:0.875rem;margin-bottom:16px">
            Download a complete JSON backup of all your data — people, events, attendance history, and gallery references.
          </p>
          <button class="btn btn-primary" onclick="CH.exportBackup()" style="width:100%;justify-content:center;margin-bottom:8px">
            💾 Download Backup JSON
          </button>
          <p style="font-size:0.78rem;color:var(--text3)">Keep backups regularly. Data is stored in your browser's localStorage.</p>
        </div>

        <!-- Restore -->
        <div class="card">
          <div class="card-title">📥 Restore from Backup</div>
          <p style="color:var(--text2);font-size:0.875rem;margin-bottom:16px">
            Restore your data from a previously downloaded backup file. <strong style="color:var(--red)">This will replace all current data.</strong>
          </p>
          <div style="display:flex;gap:8px;margin-bottom:12px">
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('restore-file').click()">📂 Load Backup File</button>
            <input type="file" id="restore-file" accept=".json" style="display:none" onchange="loadRestoreFile(event)"/>
          </div>
          <div class="form-group">
            <label>Or Paste Backup JSON</label>
            <textarea class="form-control" id="restore-json" style="min-height:100px;font-family:monospace;font-size:0.75rem" placeholder='{"version":1,"people":[...],"events":[...]}'></textarea>
          </div>
          <button class="btn btn-primary" onclick="doRestore()" style="width:100%;justify-content:center">
            ♻️ Restore Data
          </button>
        </div>

        <!-- Import Teams -->
        <div class="card">
          <div class="card-title">👥 Import from Team</div>
          <p style="color:var(--text2);font-size:0.875rem;margin-bottom:16px">
            Import team members from a JSON file. Supports Microsoft Teams / Azure AD export format with <code style="color:var(--accent)">displayName</code>, <code style="color:var(--accent)">mail</code>, <code style="color:var(--accent)">department</code> fields.
          </p>
          <a href="roster.html" class="btn btn-secondary" style="width:100%;justify-content:center">
            📥 Go to Roster Import →
          </a>
        </div>

        <!-- Danger Zone -->
        <div class="card" style="border-color:rgba(248,113,113,0.2)">
          <div class="card-title" style="color:var(--red)">⚠️ Danger Zone</div>
          <p style="color:var(--text2);font-size:0.875rem;margin-bottom:16px">
            Permanently delete all CultureHub data. This cannot be undone. Make sure you have a backup.
          </p>
          <button class="btn btn-danger" onclick="clearAllData()" style="width:100%;justify-content:center">
            🗑 Delete All Data
          </button>
        </div>
      </div>
    </div>

    <!-- About -->
    <div class="card" style="margin-top:24px;text-align:center;padding:32px">
      <div style="font-size:2rem;margin-bottom:8px">🎯</div>
      <div style="font-family:var(--font-display);font-size:1.2rem;font-weight:800;margin-bottom:6px">CultureHub</div>
      <div style="color:var(--text2);font-size:0.85rem">Office Culture Event Tracker · All data stored locally in your browser · No server required</div>
      <div style="margin-top:12px;display:flex;justify-content:center;gap:16px;font-size:0.8rem;color:var(--text3)">
        <span>📅 Events</span>
        <span>👥 Roster</span>
        <span>✅ Check-In</span>
        <span>📊 Dashboard</span>
        <span>🔍 Search</span>
        <span>🖼 Gallery</span>
      </div>
    </div>
  `;
}

window.addEventListener('culturehub:updated', render);
render();
</script>
</body>
</html>
