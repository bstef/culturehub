<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){var t=localStorage.getItem("culturehub_theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CultureHub — Check-In</title>
<link rel="stylesheet" href="style.css"/>
<style>
  .checkin-card {
    display:flex;align-items:center;gap:14px;
    padding:12px 16px;border-radius:var(--radius-sm);
    border:1px solid var(--border);background:var(--bg2);
    transition:all 0.2s;cursor:pointer;
  }
  .checkin-card:hover{border-color:var(--border2);background:var(--bg3)}
  .checkin-card.checked{border-color:rgba(54,211,153,0.3);background:rgba(54,211,153,0.05)}
  .checkin-card.winner{border-color:rgba(245,200,66,0.4);background:rgba(245,200,66,0.06)}
  .check-status{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.9rem;transition:all 0.2s}
  .checked .check-status{background:var(--green);border-color:var(--green);color:#fff}
  .winner .check-status{background:var(--gold);border-color:var(--gold);color:#1a1500}
</style>
</head>
<body>
<div id="nav-root"></div>
<main class="page" id="root"></main>

<script src="data.js"></script>
<script src="utils.js"></script>
<script>
document.getElementById('nav-root').innerHTML = navHTML();
setActiveNav();

let selectedEventId = null;
let searchQ = '';

// Get event from URL param
const urlParams = new URLSearchParams(location.search);
if (urlParams.get('event')) selectedEventId = urlParams.get('event');

function showAddAttendeeModal(eventId) {
  const event = CH.getEvents().find(e => e.id === eventId);
  const people = CH.getPeople();
  const existing = new Set(event.attendees.map(a => a.personId));
  const available = people.filter(p => !existing.has(p.id));

  openModal(`
    <div class="modal-header">
      <span class="modal-title">➕ Add to Roster</span>
      <button class="modal-close" onclick="closeModal(this)">✕</button>
    </div>
    <div class="search-wrap" style="margin-bottom:12px">
      <input class="form-control" id="att-search" placeholder="Search people…"
        oninput="filterAttModal(this.value,'${eventId}')"/>
    </div>
    <div id="att-list" style="display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto">
      ${available.length === 0 ?
        `<p style="color:var(--text2);text-align:center;padding:20px">All roster members are already added</p>` :
        available.map(p => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:background 0.15s" 
          onclick="addAndClose('${eventId}','${p.id}')"
          onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">
          ${avatarEl(p.name,'avatar-sm')}
          <div>
            <div style="font-weight:600;font-size:0.9rem">${p.name}</div>
            <div style="font-size:0.75rem;color:var(--text2)">${p.team||'No team'}</div>
          </div>
        </div>`).join('')
      }
    </div>
  `);
}

function filterAttModal(q, eventId) {
  const event = CH.getEvents().find(e => e.id === eventId);
  const existing = new Set(event.attendees.map(a => a.personId));
  const people = CH.getPeople().filter(p => !existing.has(p.id) &&
    p.name.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('att-list').innerHTML = people.length === 0 ?
    `<p style="color:var(--text2);text-align:center;padding:20px">No match</p>` :
    people.map(p => `
      <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:1px solid var(--border);cursor:pointer" 
        onclick="addAndClose('${eventId}','${p.id}')">
        ${avatarEl(p.name,'avatar-sm')}
        <div>
          <div style="font-weight:600;font-size:0.9rem">${p.name}</div>
          <div style="font-size:0.75rem;color:var(--text2)">${p.team||'No team'}</div>
        </div>
      </div>`).join('');
}

function addAndClose(eventId, personId) {
  CH.addAttendee(eventId, personId);
  closeAllModals();
  toast('Person added to event roster', 'success');
  render();
}

function toggleCheckin(eventId, personId, isChecked) {
  if (isChecked) {
    CH.undoCheckIn(eventId, personId);
    toast('Check-in removed', 'info');
  } else {
    CH.checkIn(eventId, personId);
    toast('Checked in! +1 point', 'success');
  }
  render();
}

function toggleWinner(eventId, personId) {
  const isNowWinner = CH.toggleWinner(eventId, personId);
  toast(isNowWinner ? '🏆 Marked as winner! +3 points' : 'Winner status removed', isNowWinner ? 'success' : 'info');
  render();
}

async function removeFromEvent(eventId, personId, name) {
  const ok = await confirmDialog(`Remove <strong>${name}</strong> from this event?`);
  if (!ok) return;
  CH.removeAttendee(eventId, personId);
  render();
}

function checkInAll(eventId) {
  const event = CH.getEvents().find(e => e.id === eventId);
  if (!event) return;
  event.attendees.forEach(a => {
    if (!a.checkedIn) CH.checkIn(eventId, a.personId);
  });
  toast('All participants checked in!', 'success');
  render();
}

function render() {
  const events = CH.getEvents().sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1);
  const people = CH.getPeople();

  if (!selectedEventId && events.length > 0) selectedEventId = events[0].id;
  const selectedEvent = selectedEventId ? events.find(e => e.id === selectedEventId) : null;

  document.getElementById('root').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">✅ <span>Check-In</span></div>
        <div class="page-subtitle">Manage attendance and award points</div>
      </div>
      ${selectedEvent ? `<button class="btn btn-secondary" onclick="generateReport('event','${selectedEvent.id}')">📄 Export Report</button>` : ''}
    </div>

    <div style="display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start">
      <!-- Event Selector -->
      <div class="card" style="position:sticky;top:calc(var(--nav-h)+20px)">
        <div class="card-title">📅 Select Event</div>
        <div style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto">
          ${events.length === 0 ?
            `<p style="color:var(--text2);font-size:0.85rem">No events yet. <a href="events.html" style="color:var(--accent)">Create one →</a></p>` :
            events.map(ev => {
              const attended = ev.attendees.filter(a=>a.checkedIn).length;
              const isSelected = ev.id === selectedEventId;
              return `
              <div onclick="selectedEventId='${ev.id}';searchQ='';render()"
                style="padding:12px;border-radius:8px;border:1px solid ${isSelected?'var(--accent)':'var(--border)'};
                background:${isSelected?'var(--accent-glow)':'var(--bg3)'};cursor:pointer;transition:all 0.15s">
                <div style="font-weight:600;font-size:0.88rem;margin-bottom:4px">${ev.title}</div>
                <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                  <span style="font-size:0.75rem;color:var(--text2)">${fmtDate(ev.date)}</span>
                  <span class="badge ${attended>0?'badge-green':'badge-gray'}" style="font-size:0.7rem">${attended} in</span>
                  ${isUpcoming(ev.date)?'<span class="badge badge-accent" style="font-size:0.7rem">Live</span>':''}
                </div>
              </div>`;
            }).join('')}
        </div>
      </div>

      <!-- Check-In Panel -->
      <div>
        ${!selectedEvent ? `
          <div class="empty-state">
            <span class="empty-icon">✅</span>
            <h3>Select an event</h3>
            <p>Choose an event from the left to manage check-ins</p>
          </div>` : (() => {
            let attendees = selectedEvent.attendees;
            const searchFiltered = searchQ
              ? attendees.filter(a => {
                  const p = people.find(x => x.id === a.personId);
                  return p && p.name.toLowerCase().includes(searchQ);
                })
              : attendees;
            const sortedAttendees = [...searchFiltered].sort((a,b) => {
              if (a.checkedIn && !b.checkedIn) return -1;
              if (!a.checkedIn && b.checkedIn) return 1;
              const pa = people.find(x=>x.id===a.personId);
              const pb = people.find(x=>x.id===b.personId);
              return (pa?.name||'').localeCompare(pb?.name||'');
            });
            const checked = attendees.filter(a=>a.checkedIn).length;
            const winners = attendees.filter(a=>a.isWinner).length;
            const pts = attendees.filter(a=>a.checkedIn).reduce((s,a)=>s+a.points,0);

            return `
            <!-- Event Header -->
            <div class="card" style="margin-bottom:20px">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
                <div>
                  <div style="font-family:var(--font-display);font-size:1.3rem;font-weight:800;margin-bottom:6px">${selectedEvent.title}</div>
                  <div style="display:flex;gap:8px;flex-wrap:wrap">
                    ${eventTypeBadge(selectedEvent.type)}
                    <span style="font-size:0.85rem;color:var(--text2)">📅 ${fmtDate(selectedEvent.date)}</span>
                    ${selectedEvent.location?`<span style="font-size:0.85rem;color:var(--text2)">📍 ${selectedEvent.location}</span>`:''}
                  </div>
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                  <button class="btn btn-secondary btn-sm" onclick="showAddAttendeeModal('${selectedEvent.id}')">+ Add People</button>
                  <button class="btn btn-secondary btn-sm" onclick="checkInAll('${selectedEvent.id}')">✅ Check All In</button>
                </div>
              </div>
              <div style="display:flex;gap:20px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
                <div><span style="font-weight:800;color:var(--green)">${checked}</span> <span style="font-size:0.8rem;color:var(--text2)">checked in</span></div>
                <div><span style="font-weight:800">${attendees.length}</span> <span style="font-size:0.8rem;color:var(--text2)">registered</span></div>
                <div><span style="font-weight:800;color:var(--gold)">${winners}</span> <span style="font-size:0.8rem;color:var(--text2)">winners</span></div>
                <div><span style="font-weight:800;color:var(--accent)">${pts}</span> <span style="font-size:0.8rem;color:var(--text2)">points awarded</span></div>
              </div>
            </div>

            <!-- Search -->
            <div class="search-wrap" style="margin-bottom:16px">
              <input class="form-control" placeholder="Search attendees…" value="${searchQ}"
                oninput="searchQ=this.value.toLowerCase();render()"/>
            </div>

            <!-- Scoring legend -->
            <div style="display:flex;gap:12px;margin-bottom:16px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--text2)">
              <span>🟢 Check-in = <strong style="color:var(--green)">1 point</strong></span>
              <span>🏆 Winner = <strong style="color:var(--gold)">3 points</strong></span>
              <span style="margin-left:auto;font-style:italic">Click a card to check in. Click 🏆 to mark winner.</span>
            </div>

            <!-- Attendees -->
            ${sortedAttendees.length === 0 ?
              `<div class="empty-state" style="padding:40px">
                <span class="empty-icon">👤</span>
                <h3>${searchQ ? 'No match' : 'No one added yet'}</h3>
                <p>${searchQ ? '' : 'Click "+ Add People" to add roster members to this event.'}</p>
              </div>` :
              `<div style="display:flex;flex-direction:column;gap:8px">
                ${sortedAttendees.map(a => {
                  const p = people.find(x => x.id === a.personId);
                  if (!p) return '';
                  return `
                  <div class="checkin-card ${a.isWinner?'winner':a.checkedIn?'checked':''}"
                    onclick="toggleCheckin('${selectedEvent.id}','${p.id}',${a.checkedIn})">
                    <div class="check-status">${a.isWinner?'🏆':a.checkedIn?'✓':''}</div>
                    ${avatarEl(p.name)}
                    <div style="flex:1;min-width:0">
                      <div style="font-weight:600">${p.name}</div>
                      <div style="font-size:0.78rem;color:var(--text2)">${p.team||'No team'} ${p.email?'· '+p.email:''}</div>
                    </div>
                    ${a.checkedIn ? pointsBadge(a.points, a.isWinner) : '<span class="badge badge-gray">Not checked in</span>'}
                    ${a.checkedIn ? `
                    <button class="btn btn-sm btn-icon ${a.isWinner?'btn-gold':'btn-ghost'}" title="${a.isWinner?'Remove winner':'Mark as winner'}"
                      onclick="event.stopPropagation();toggleWinner('${selectedEvent.id}','${p.id}')">🏆</button>` : ''}
                    <button class="btn btn-sm btn-ghost btn-icon" title="Remove from event"
                      onclick="event.stopPropagation();removeFromEvent('${selectedEvent.id}','${p.id}','${p.name.replace(/'/g,"\\'")}')">✕</button>
                  </div>`;
                }).join('')}
              </div>`
            }`;
          })()
        }
      </div>
    </div>
  `;
}

window.addEventListener('culturehub:updated', render);
render();
</script>
</body>
</html>
